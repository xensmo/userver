# yaml
components_manager:
    graceful_shutdown_interval: 10s

    components:
        # The required common components
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        dynamic-config:
            updates-enabled: true
            fs-cache-path: $dynamic-config-cache
            fs-task-processor: fs-task-processor

        dynamic-config-client:
            config-url: $config-server-url
            http-retries: 5
            http-timeout: 20s
            service-name: testsuite-support

        dynamic-config-client-updater:
            config-settings: false
            first-update-fail-ok: true
            full-update-interval: 1m
            update-interval: 5s            

        http-client:
        http-client-core:
            fs-task-processor: main-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        handler-server-monitor:
            path: /service/monitor
            method: GET
            task_processor: main-task-processor

        # gRPC server and service
        grpc-server:
            port: 8091

        congestion-control:

        # /// [middleware pipeline component config]
        grpc-server-logging:
            msg-size-log-limit: 15

        my-second-middleware-server:
        # /// [my-middleware-server config]
        my-middleware-server:

        grpc-server-middlewares-pipeline:
            middlewares:
                # We must register middlewares in the pipeline:
                my-middleware-server:
                    enabled: true
                    # /// [my-middleware-server config]
                my-second-middleware-server:
                    enabled: true

        greeter-service:
            task-processor: main-task-processor
            middlewares:
                grpc-server-logging:
                    msg-size-log-limit: 10  # you can override a config per service
                    # /// [middleware pipeline component config]

        # http server
        server:
            listener:
                port: 8092
                task_processor: main-task-processor
            listener-monitor:
                port: $monitor-server-port
                port#fallback: 8086
                connection:
                    in_buffer_size: 32768
                    requests_queue_size_threshold: 100
                task_processor: main-task-processor

        tests-control:
            method: POST
            path: /tests/{action}
            skip-unregistered-testpoints: true
            task_processor: main-task-processor
            testpoint-timeout: 10s
            testpoint-url: $mockserver/testpoint
            throttling_enabled: false

        testsuite-support: {}

    default_task_processor: main-task-processor

    task_processors:
        grpc-blocking-task-processor:  # For blocking gRPC channel creation
            thread_name: grpc-worker
            worker_threads: 2
        main-task-processor:  # For non-blocking operations
            worker_threads: 4
        fs-task-processor:  # For blocking filesystem operations
            worker_threads: 2
