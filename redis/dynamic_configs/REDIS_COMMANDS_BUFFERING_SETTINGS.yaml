default:
    buffering_enabled: false
    watch_command_timer_interval_us: 0
description: |
    Dynamic config that controls command buffering for specific service.
    Enabling of this config activates a delay in sending commands. When commands are sent, they are combined into a single tcp packet and sent together.
    First command arms timer and then during `watch_command_timer_interval_us` commands are accumulated in the buffer

    Command buffering is disabled by default.
schema:
    example: |
        {
          "buffering_enabled": true,
          "commands_buffering_threshold": 10,
          "watch_command_timer_interval_us": 1000
        }
    type: object
    additionalProperties: false
    properties:
        buffering_enabled:
            description: enable buffering
            type: boolean
        commands_buffering_threshold:
            description: Threshold for the number of requests in the buffer. When this number of commands is reached, requests
                are sent to the server immediately. Absence of this field disables the threshold (only the timeout limit remains
                active).
            type: integer
            minimum: 1
        watch_command_timer_interval_us:
            description: Maximum wait time for a request in the buffer before sending to the server, in microseconds. 0 - disables
                buffering.
            type: integer
            minimum: 0
    required:
      - buffering_enabled
      - watch_command_timer_interval_us
