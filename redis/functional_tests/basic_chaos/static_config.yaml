# yaml
components_manager:
    components:
        handler-chaos:
            path: /chaos
            task_processor: main-task-processor
            method: GET,DELETE,POST
        handler-chaos-many-requests:
            path: /chaos-many-requests
            task_processor: main-task-processor
            method: GET
        handler-server-monitor:
            path: /service/monitor
            method: GET
            task_processor: main-task-processor


        key-value-database:
            groups:
              - config_name: test
                db: test
            subscribe_groups:
            thread_pools:
                redis_thread_pool_size: 8
                sentinel_thread_pool_size: 1

        testsuite-support:

        server:
            listener:
                port: 8187
                task_processor: main-task-processor
            listener-monitor:
                port: $monitor-server-port
                port#fallback: 8086
                connection:
                    in_buffer_size: 32768
                    requests_queue_size_threshold: 100
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        dynamic-config:
            updates-enabled: true
            defaults:
                REDIS_DEADLINE_PROPAGATION_VERSION: 1
                REDIS_METRICS_SETTINGS:
                    command-timings-enabled: true
                    reply-sizes-enabled: true
                    request-sizes-enabled: true
                    timings-enabled: true
                REDIS_PUBSUB_METRICS_SETTINGS:
                    per-shard-stats-enabled: true

        dynamic-config-client:
            config-url: $config-server-url
            http-retries: 5
            http-timeout: 20s
            service-name: testsuite-support
        dynamic-config-client-updater:
            config-settings: false
            first-update-fail-ok: true
            full-update-interval: 1m
            update-interval: 5s

        dns-client:
            fs-task-processor: fs-task-processor

        secdist: {}

        default-secdist-provider:
            config: /etc/redis_service/secure_data.json
            missing-ok: true
            environment-secrets-key: SECDIST_CONFIG

        http-client:
        http-client-core:
            fs-task-processor: main-task-processor

        tests-control:
            method: POST
            path: /tests/{action}
            skip-unregistered-testpoints: true
            task_processor: main-task-processor
            testpoint-timeout: 10s
            testpoint-url: $mockserver/testpoint
            throttling_enabled: false

    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 4

    default_task_processor: main-task-processor
