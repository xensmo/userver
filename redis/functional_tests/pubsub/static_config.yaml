# yaml
components_manager:
    components:
        handler-sentinel:
            db: redis-sentinel
            path: /redis-sentinel
            task_processor: main-task-processor
            method: GET,DELETE,PUT

        handler-sentinel-with-master:
            db: redis-sentinel-with-master
            path: /redis-sentinel-with-master
            task_processor: main-task-processor
            method: GET,DELETE,PUT

        handler-cluster:
            db: redis-cluster
            path: /redis-cluster
            task_processor: main-task-processor
            method: GET,DELETE,PUT

        handler-standalone:
            db: redis-standalone
            path: /redis-standalone
            task_processor: main-task-processor
            method: GET,DELETE,PUT

        handler-many-subscriptions:
            path: /many-subscriptions
            task_processor: main-task-processor
            method: GET,DELETE
            db: redis-cluster

        handler-publisher:
            path: /publisher
            task_processor: main-task-processor
            method: GET
            db: redis-sentinel

        key-value-database:
            groups:
              - config_name: redis-sentinel
                db: redis-sentinel
            subscribe_groups:
              - config_name: redis-sentinel
                db: redis-sentinel
              - config_name: redis-cluster
                db: redis-cluster
                sharding_strategy: RedisCluster
              - config_name: redis-sentinel
                db: redis-sentinel-with-master
                allow_reads_from_master: true
              - config_name: redis-standalone
                db: redis-standalone
                sharding_strategy: RedisStandalone
            thread_pools:
                redis_thread_pool_size: 2
                sentinel_thread_pool_size: 1

        testsuite-support:

        http-client:
        http-client-core:
            fs-task-processor: main-task-processor

        tests-control:
            method: POST
            path: /tests/{action}
            skip-unregistered-testpoints: true
            task_processor: main-task-processor
            testpoint-timeout: 10s
            testpoint-url: $mockserver/testpoint
            throttling_enabled: false

        secdist: {}
        default-secdist-provider:
            config: /etc/redis_service/secure_data.json
            missing-ok: true
            environment-secrets-key: SECDIST_CONFIG

        server:
            listener:
                port: 8187
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        dns-client:
            fs-task-processor: fs-task-processor

    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 4

    default_task_processor: main-task-processor
