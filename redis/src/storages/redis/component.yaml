type: object
description: Redis client component
additionalProperties: false
properties:
    thread_pools:
        type: object
        description: thread pools options
        additionalProperties: false
        properties:
            redis_thread_pool_size:
                type: integer
                description: thread count to serve Redis requests
            sentinel_thread_pool_size:
                type: integer
                description: thread count to serve sentinel requests
    groups:
        type: array
        description: array of redis clusters to work with excluding subscribers
        items:
            type: object
            description: redis cluster to work with excluding subscribers
            additionalProperties: false
            properties:
                config_name:
                    type: string
                    description: key name in secdist with options for this cluster
                db:
                    type: string
                    description: name to refer to the cluster in components::Redis::GetClient()
                sharding_strategy:
                    type: string
                    description: one of RedisStandalone, RedisCluster, KeyShardCrc32, KeyShardTaximeterCrc32 or KeyShardGpsStorageDriver
                    default: "KeyShardTaximeterCrc32"
                    enum:
                      - RedisCluster
                      - KeyShardCrc32
                      - KeyShardTaximeterCrc32
                      - KeyShardGpsStorageDriver
                      - RedisStandalone
                allow_reads_from_master:
                    type: boolean
                    description: allows read requests from master instance
                    default: false
                topology_update_method:
                    type: string
                    description: |
                        Topology update method for cluster databases.
                        cluster_slots - use CLUSTER SLOTS command (default).
                        cluster_shards - use CLUSTER SHARDS command.
                    default: cluster_slots
                    enum:
                      - cluster_slots
                      - cluster_shards
                required:
                    type: string
                    description: required connection mode for the client
                    enum:
                      - no_wait
                      - master
                      - slave
                      - master_or_slave
                      - master_and_slave
                max_disconnect_time:
                    type: integer
                    description: |
                        The maximum allowed time in seconds for a database host to be disconnected before it is considered unhealthy.
                        It depends on the `cluster-node-timeout` setting in the Redis/Valkey config and should be greater than 2x that value plus some additional time.
                    minimum: 0
                    maximum: 1000
                    default: 35
                max_failed_shards:
                    type: object
                    description: |
                        Maximum number or percent of failed shards allowed in GetComponentHealth check.
                        0 means all shards must be ready (default behavior).
                        This only affects health checks, not WaitConnectedOnce.
                    additionalProperties: false
                    properties:
                        amount:
                            type: integer
                            description: Maximum number of failed shards allowed.
                            default: 0
                            minimum: 0
                        percent:
                            type: integer
                            description: Maximum percent of failed shards allowed.
                            default: 0
                            minimum: 0
    metrics_level:
        type: string
        description: set metrics detail level
        default: instance
        enum:
          - cluster
          - shard
          - instance
    subscribe_groups:
        type: array
        description: array of redis clusters to work with in subscribe mode
        items:
            type: object
            description: redis cluster to work with in subscribe mode
            additionalProperties: false
            properties:
                config_name:
                    type: string
                    description: key name in secdist with options for this cluster
                db:
                    type: string
                    description: name to refer to the cluster in components::Redis::GetSubscribeClient()
                sharding_strategy:
                    type: string
                    description: either RedisCluster or KeyShardTaximeterCrc32
                    default: "KeyShardTaximeterCrc32"
                    enum:
                      - RedisCluster
                      - KeyShardTaximeterCrc32
                      - RedisStandalone
                allow_reads_from_master:
                    type: boolean
                    description: allows subscriptions to master instance to distribute load
                    default: false
                topology_update_method:
                    type: string
                    description: |
                        Topology update method for cluster databases.
                        cluster_slots - use CLUSTER SLOTS command (default).
                        cluster_shards - use CLUSTER SHARDS command.
                    default: cluster_slots
                    enum:
                      - cluster_slots
                      - cluster_shards
                per_channel_statistics:
                    type: boolean
                    description: enables statistics for each redis pub/sub channel
                    default: true
                required:
                    type: string
                    description: required connection mode for the subscription client
                    enum:
                      - no_wait
                      - master
                      - slave
                      - master_or_slave
                      - master_and_slave
                max_disconnect_time:
                    type: integer
                    description: |
                        The maximum allowed time in seconds for a database host to be disconnected before it is considered unhealthy.
                        It depends on the `cluster-node-timeout` setting in the Redis/Valkey config and should be greater than 2x that value plus some additional time.
                    minimum: 0
                    maximum: 1000
                    default: 35
                max_failed_shards:
                    type: object
                    description: |
                        Maximum number or percent of failed shards allowed in GetComponentHealth check.
                        0 means all shards must be ready (default behavior).
                        This only affects health checks, not WaitConnectedOnce.
                    additionalProperties: false
                    properties:
                        amount:
                            type: integer
                            description: Maximum number of failed shards allowed.
                            default: 0
                            minimum: 0
                        percent:
                            type: integer
                            description: Maximum percent of failed shards allowed.
                            default: 0
                            minimum: 0
