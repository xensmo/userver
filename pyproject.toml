[tool.mypy]
implicit_optional = true
disable_error_code = ["name-match", "arg-type"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.format]
preview = true
quote-style = "single"
indent-style = "space"
line-ending = "lf"

skip-magic-trailing-comma = false

docstring-code-format = false
docstring-code-line-length = "dynamic"

[tool.ruff.lint]
preview = true
select = [
    "I",
    "PYI026",
    "PYI032",
    "Q000",
    "UP006",
    "UP007",
    "UP035",
    "UP045",
    "ICN003", # banned-import-from
    "W291",
]
ignore = []
unfixable = []

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "single"
multiline-quotes = "double"

[tool.ruff.lint.flake8-import-conventions]
# Generated by:
# $ find chaotic/ -name '*py' | grep -v __init__ | cut -d. -f1 | tr / .
# and removed *.main
banned-from = [
    "chaotic.back.cpp.type_name",
    "chaotic.back.cpp.renderer",
    "chaotic.back.cpp.translator",
    "chaotic.back.cpp.types",
    "chaotic.compilers.dynamic_config",
    "chaotic.cpp_keywords",
    "chaotic.cpp_names",
    "chaotic.error",
    "chaotic.front.base_model",
    "chaotic.front.parser",
    "chaotic.front.ref",
    "chaotic.front.ref_resolver",
    "chaotic.front.types",
    "chaotic.cpp_format",
    "chaotic.jinja_env",
    "chaotic_openapi.back.cpp_client.middleware",
    "chaotic_openapi.back.cpp_client.renderer",
    "chaotic_openapi.back.cpp_client.translator",
    "chaotic_openapi.back.cpp_client.output",
    "chaotic_openapi.back.cpp_client.types",
    "chaotic_openapi.back.linter.validators",
    "chaotic_openapi.front.base_model",
    "chaotic_openapi.front.errors",
    "chaotic_openapi.front.ref_resolver",
    "chaotic_openapi.front.model",
    "chaotic_openapi.front.openapi",
    "chaotic_openapi.front.parser",
    "chaotic_openapi.front.swagger",
]

[tool.ruff.lint.isort]
force-single-line = true
relative-imports-order = "closest-to-furthest"

force-sort-within-sections = true
case-sensitive = false
order-by-type = false

section-order = [
    "future",
    "standard-library",
    "third-party",
    "appnexus",
    "first-party",
    "local-folder",
]
no-lines-before = [
    "local-folder",
]
known-third-party = [
    "grpc",
    "google",
    "conan",
    "redis",
]
known-first-party = [
    "requests_client",
    "chaotic",
    "samples",
    "utils",
]

[tool.ruff.lint.isort.sections]
appnexus = [
    "testsuite",
    "taxi",
]
