definitions:
    OneOfDiscriminator:
        type: object
        additionalProperties: false
        properties:
            foo:
                oneOf:
                  - $ref: '#/definitions/A'
                  - $ref: '#/definitions/B'
                discriminator:
                    propertyName: type
                    mapping:
                        aaa: '#/definitions/A'
                        bbb: '#/definitions/B'
    A:
        type: object
        additionalProperties: true
        properties:
            type:
                type: string
            a_prop:
                type: integer
                minimum: 1
                maximum: 100
        x-taxi-extra-member: true
    B:
        type: object
        additionalProperties: true
        properties:
            type:
                type: string
            b_prop:
                type: integer
                minimum: 1
                maximum: 100

        x-taxi-extra-member: true

    IntegerOneOfDiscriminator:
        type: object
        additionalProperties: false
        properties:
            foo:
                oneOf:
                  - $ref: '#/definitions/C'
                  - $ref: '#/definitions/D'
                discriminator:
                    propertyName: version
                    mapping:
                        42: '#/definitions/C'
                        52: '#/definitions/D'

    C:
        type: object
        additionalProperties: false
        properties:
            version:
                type: integer
                minimum: 40
                maximum: 50

    D:
        type: object
        additionalProperties: false
        properties:
            version:
                type: integer
                minimum: 50
                maximum: 60

    OneOfToRefToRef:
        oneOf:
          - $ref: '#/definitions/RefToC'
        discriminator:
            propertyName: version

    RefToC:
        $ref: '#/definitions/C'
