type: object
description: Base class for postgres-based distlock worker components
additionalProperties: false
properties:
    cluster:
        type: string
        description: postgres cluster name
    shard-number:
        type: integer
        description: postgres shard number
    table:
        type: string
        description: table name to store distlocks
    lockname:
        type: string
        description: name of the lock
    lock-ttl:
        type: string
        description: TTL of the lock; must be at least as long as the duration between
            subsequent cancellation checks, otherwise brain split is possible
    pg-timeout:
        type: string
        description: timeout, must be less than lock-ttl/2
    restart-delay:
        type: string
        description: how much time to wait after failed task restart
        default: 100ms
    autostart:
        type: boolean
        description: if true, start automatically after component load
        default: true
    task-processor:
        type: string
        description: the name of the TaskProcessor for running DoWork
        default: main-task-processor
    testsuite-support:
        type: boolean
        description: Enable testsuite support
        default: false
    locker-log-level:
        type: string
        description: Base logging level for locker logs (default is info)
