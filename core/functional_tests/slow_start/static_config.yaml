components_manager:
    components:

        congestion-control:
            fake-mode: $testsuite-enabled
            load-enabled: true
        dump-configurator:
            dump-root: ./dumps/
        handler-implicit-http-options:
            as_fallback: implicit-http-options
            method: OPTIONS
            task_processor: main-task-processor
            throttling_enabled: false

        handler-inspect-requests:
            path: /service/inspect-requests
            method: GET
            task_processor: monitor-task-processor
        handler-jemalloc:
            path: /service/jemalloc/prof/{command}
            method: POST
            task_processor: monitor-task-processor
        handler-log-level:
            path: /service/log-level/{level}
            method: GET,PUT
            task_processor: monitor-task-processor
        handler-on-log-rotate:
            path: /service/on-log-rotate/
            method: POST
            task_processor: monitor-task-processor
        handler-dynamic-debug-log:
            path: /service/log/dynamic-debug
            method: GET,PUT,DELETE
            task_processor: monitor-task-processor
        handler-dns-client-control:
            path: /service/dnsclient/{command}
            method: POST
            task_processor: monitor-task-processor
        handler-server-monitor:
            path: /service/monitor
            method: GET
            task_processor: monitor-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor  # !!!
            throttling_enabled: false
            url_trailing_slash: strict-match
        http-client:
        http-client-core:
            fs-task-processor: fs-task-processor
            user-agent: $server-name
            user-agent#fallback: 'userver-based-service 1.0'

        http-client-statistics:
            core-component: http-client-statistics-core
        http-client-statistics-core:
            fs-task-processor: fs-task-processor
            pool-statistics-disable: true
            thread-name-prefix: stats
            user-agent: $server-name
        logging:
            loggers:
                access:
                    file_path: $access-log-path
                    file_path#fallback: ./access.log
                    overflow_behavior: discard
                    format: raw
                access-tskv:
                    file_path: $access-tskv-log-path
                    file_path#fallback: ./access_tskv.log
                    overflow_behavior: discard
                    format: raw
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard
        logging-configurator:
            limited-logging-enable: true
            limited-logging-interval: 1s

        default-secdist-provider: {}

        server:
            listener:
                port: $server-port
                port#fallback: 8085
                connection:
                    in_buffer_size: 32768
                    requests_queue_size_threshold: 100
                task_processor: main-task-processor
            listener-monitor:
                port: $monitor-server-port
                port#fallback: 8086
                connection:
                    in_buffer_size: 32768
                    requests_queue_size_threshold: 100
                task_processor: monitor-task-processor
            logger_access: ''
            logger_access_tskv: ''
            max_response_size_in_flight: 1000000000
            server-name: $server-name

        system-statistics-collector:
            fs-task-processor: fs-task-processor

        dynamic-config:
            updates-enabled: true
            fs-cache-path: $config-cache
            fs-task-processor: fs-task-processor
        dynamic-config-client:
            config-url: $config-server-url
            http-retries: 5
            http-timeout: 20s
            service-name: test
        dynamic-config-client-updater:
            config-settings: false
            first-update-fail-ok: true
            full-update-interval: 1m
            update-interval: 5s

        tests-control:
            load-enabled: $testsuite-enabled
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor
            testpoint-timeout: 10s
            testpoint-url: $mockserver/testpoint
            throttling_enabled: false
        testsuite-support:
        slow-component:

    default_task_processor: main-task-processor
    enable_component_load_tracing: true
    component_load_print_interval: 1s

    task_processors:
        fs-task-processor:
            worker_threads: 1
            worker_threads#fallback: 2
        main-task-processor:
            worker_threads: 2
            worker_threads#fallback: 6
        monitor-task-processor:
            thread_name: mon-worker
            worker_threads: 1
    event_thread_pool:
        threads: 2
