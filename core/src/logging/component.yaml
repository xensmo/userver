type: object
description: Logging component
additionalProperties: false
properties:
    fs-task-processor:
        type: string
        description: task processor for disk I/O operations
        default: engine::current_task::GetBlockingTaskProcessor()
    loggers:
        type: object
        description: logger options
        properties: {}
        additionalProperties:
            type: object
            description: logger options
            additionalProperties: false
            properties:
                file_path:
                    type: string
                    description: path to the log file
                level:
                    type: string
                    description: log verbosity
                    default: info
                format:
                    type: string
                    description: log output format
                    default: tskv
                    enum:
                      - tskv
                      - ltsv
                      - raw
                      - json
                      - json_yadeploy
                flush_level:
                    type: string
                    description: messages of this and higher levels get flushed to
                        the file immediately
                    default: warning
                message_queue_size:
                    type: integer
                    description: the size of internal message queue, must be a power
                        of 2
                    default: 65536
                overflow_behavior:
                    type: string
                    description: "message handling policy while the queue is full:
                        `discard` drops messages, `block` waits until message gets
                        into the queue"
                    default: discard
                    enum:
                      - discard
                      - block
                fs-task-processor:
                    type: string
                    description: task processor for disk I/O operations for this logger
                    default: top-level `fs-task-processor` option
                testsuite-capture:
                    type: object
                    description: if exists, setups additional TCP log sink for testing
                        purposes
                    default: "{}"
                    additionalProperties: false
                    properties:
                        host:
                            type: string
                            description: testsuite hostname, e.g. localhost
                        port:
                            type: integer
                            description: testsuite port
