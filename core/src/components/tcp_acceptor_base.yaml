# yaml
type: object
description: |
    Component for accepting incoming TCP connections and passing a
    socket to derived class
additionalProperties: false
properties:
    port:
        type: integer
        description: port to listen on
    unix-socket:
        type: string
        description: unix socket to listen on instead of listening on a port
        default: ''
    task_processor:
        type: string
        description: |
            Task processor to accept incoming connections.

            Default: the 'default_task_processor' value from components::ManagerControllerComponent
    backlog:
        type: integer
        description: max count of new connections pending acceptance
        default: 1024
    no_delay:
        type: boolean
        description: whether to set the TCP_NODELAY option on incoming sockets
        default: true
    sockets_task_processor:
        type: string
        description: |
            Task processor to process accepted sockets.

            Default: value of `task_processor`
