type: object
description: Component to limit too active requests, also known as CC.
additionalProperties: false
properties:
    fake-mode:
        type: boolean
        description: if set, an actual throttling is skipped, but FSM is still working
            and producing informational logs
        default: false
    min-cpu:
        type: integer
        description: force fake-mode if the current cpu number is less than the specified
            value
        default: 1
    only-rtc:
        type: boolean
        description: if set to true and hostinfo::IsInRtc() returns false then forces
            the fake-mode
        default: true
    status-code:
        type: integer
        description: HTTP status code for ratelimited responses
        default: 429
