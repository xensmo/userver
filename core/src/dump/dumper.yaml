type: object
description: Dumper sub-schema
additionalProperties: false
properties:
    dump:
        type: object
        description: manages dumps
        additionalProperties: false
        properties:
            enable:
                type: boolean
                description: Whether this `Dumper` should actually read and write
                    dumps
            world-readable:
                type: boolean
                description: If true, dumps are created with access 0444, otherwise
                    with access 0400
            format-version:
                type: integer
                description: Allows to ignore dumps written with an obsolete format-version
            max-age:
                type: string
                description: |
                    Overdue dumps are ignored

                    Default: unlimited
            max-count:
                type: integer
                description: Old dumps over the limit are removed from disk
                default: 1
            min-interval:
                type: string
                description: "`WriteDumpAsync` calls performed in a fast succession
                    are ignored"
                default: 0s
            fs-task-processor:
                type: string
                description: |
                    TaskProcessor for blocking disk IO.

                    Default: engine::current_task::GetBlockingTaskProcessor()
            encrypted:
                type: boolean
                description: Whether to encrypt the dump
                default: false
