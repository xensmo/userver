default:
    default-service:
        default-task-processor:
            wait_queue_overload:
                action: ignore
                length_limit: 5000
                time_limit_us: 3000
description: Controls engine::TaskProcessor quality of service dynamic config.
schema:
    type: object
    required:
      - default-service
    additionalProperties: false
    properties:
        default-service:
            $ref: '#/definitions/DefaultService'
    definitions:
        DefaultService:
            type: object
            additionalProperties:
                $ref: '#/definitions/TaskProcessor'
            required:
              - default-task-processor
            properties:
                default-task-processor:
                    $ref: '#/definitions/TaskProcessor'

        TaskProcessor:
            type: object
            additionalProperties: false
            required:
              - wait_queue_overload
            properties:
                wait_queue_overload:
                    $ref: '#/definitions/WaitQueueOverload'

        WaitQueueOverload:
            type: object
            additionalProperties: false
            required:
              - time_limit_us
              - length_limit
              - action
            properties:
                time_limit_us:
                    type: integer
                    x-usrv-cpp-type: std::chrono::microseconds
                    minimum: 0
                    description: maximum queue wait time before applying action (in microseconds)
                length_limit:
                    x-usrv-cpp-type: unsigned
                    type: integer
                    minimum: 0
                    description: maximum queue length before applying action
                action:
                    type: string
                    enum:
                      - ignore
                      - cancel
                    description: what to do with tasks on queue overload; 'cancel' cancels tasks
                sensor_time_limit_us:
                    type: integer
                    x-usrv-cpp-type: std::chrono::microseconds
                    default: 3000
                    minimum: 0
                    description: |-
                        maximum queue wait time before generating overload
                        events (in microseconds); RPS congestion control only

