openapi: 3.0.0
info:
    title: Handler integration test
    version: '1.0'

paths:
    /greet:
        get:
            operationId: greetGet
            parameters:
              - in: query
                name: name
                required: true
                schema:
                    type: string
              - in: query
                name: count
                schema:
                    type: integer
            responses:
                200:
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: string
                404:
                    description: Not found

    /secret:
        get:
            operationId: secretGet
            parameters:
              - in: query
                name: token
                required: true
                description: >-
                    Warning: should be used for legacy API / test only,
                    as the query might still be logged on proxies/other HTTP agents.
                x-usrv-query-log-mode: hide
                schema:
                    type: string
              - in: query
                name: name
                required: true
                schema:
                    type: string
            responses:
                200:
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: string

    /octet:
        get:
            operationId: octetGet
            requestBody:
                required: true
                content:
                    application/octet-stream:
                        schema:
                            type: string
            responses:
                200:
                    description: OK
                    content:
                        application/octet-stream:
                            schema:
                                type: string

    /form:
        post:
            operationId: formPost
            requestBody:
                required: true
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                count:
                                    type: integer
                            required:
                              - name
            responses:
                200:
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: string

    /multipart:
        post:
            operationId: multipartPost
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                count:
                                    type: integer
                            required:
                              - name
            responses:
                200:
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: string

    /multi:
        post:
            operationId: multiPost
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: string
                    application/octet-stream:
                        schema:
                            type: string
            responses:
                200:
                    description: OK

components: {}
